    - ash_oracle
  boss: emberlord
  template: null
tomb:
  name: Tomb of the Scarab King
  difficulty: 5
  theme:
    axis: shape
    value: defend
  # IDENTITY: the sand drift BURIES your board under Stone (Defend); the tomb then
  # seals those useless shields away (entomb-lock) and saps the old curse.
  drift: entomb
  boss_mirror: sand_curse_lesser
  enemy_table:
