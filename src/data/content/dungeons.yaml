  boss: the_drowned_god
  template: null
emberdeep:
  name: The Emberdeep
  difficulty: 4
  theme:
    axis: color
    value: red
  # IDENTITY: elemental fire — the inferno drift floods the board to Fire (two
  # runes / tick) and the deep-fire burns the magic from your veins (mana-burn).
  drift: inferno
  boss_mirror: mana_sear_lesser
  enemy_table:
    - foe: emberkin
      weight: 32
    - foe: magma_bat
      weight: 20
    - foe: cinder_shaman
