  boss: the_barrow_wight
  template: null
sunken_temple:
  name: The Sunken Temple
  difficulty: 4
  theme:
    axis: color
    value: blue
  # IDENTITY: drown-lock (Moves bind + flood to Frost) + frost mana-burn.
  drift: tide
  boss_mirror: frost_sear_lesser
  enemy_table:
