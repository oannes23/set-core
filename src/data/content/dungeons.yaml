# --- THE TWELVE GATES — ascending challenge, L1 through L21 (the parity line) ---
# Each dungeon has a distinct MECHANICAL identity (drift + foe roster), not just a
# stat reskin. Foes are shared across families (undead span Crypt→Tomb→Citadel;
# cultists Serpent→Rift; fire Emberdeep→Rift→Wyrm) to give the roster real breadth.
goblin_warren:
  name: The Goblin Warren
  difficulty: 1
  theme:
    axis: color
    value: red
  # IDENTITY: theft & sabotage. The scavenge drift drags runes toward Threes,
  # feeding the goblins' own grasping/covetous/greedy steal-triggers.
  drift: scavenge
  boss_mirror: war_cry_lesser
  enemy_table:
    - foe: goblin
      weight: 35
    - foe: cave_bat
      weight: 20
    - foe: goblin_shaman
      weight: 15
    - foe: goblin_archer
      weight: 12
    - foe: goblin_sapper
      weight: 10
    - foe: warren_rat
      weight: 8
  elite_pool:
    - goblin_warlord
    - ember_shaman
    - warren_butcher
    - goblin_oracle
  boss: goblin_king
  template: null
sewers:
  name: The Ratking's Sewers
  difficulty: 1
  theme:
    axis: color
    value: green
  # IDENTITY: a cheap, fast swarm the plague keeps knitting whole. Greens heal them.
  drift: rot
  boss_mirror: fester_lesser
  enemy_table:
    - foe: dire_rat
      weight: 30
    - foe: plague_rat
      weight: 22
    - foe: warren_rat
      weight: 18
    - foe: giant_centipede
      weight: 15
    - foe: sewer_slime
      weight: 10
    - foe: cave_bat
      weight: 5
  elite_pool:
    - plague_bloat
    - rat_ogre
  boss: the_ratking
  template: null
tangleweald:
  name: The Tangleweald
  difficulty: 2
  theme:
    axis: color
    value: green
  # IDENTITY: web-lock board denial + venom that scales with the runes you spend.
  drift: rot
  boss_mirror: web_snare_lesser
  enemy_table:
    - foe: giant_spider
      weight: 28
    - foe: spiderling_swarm
      weight: 22
    - foe: venom_wasp
      weight: 16
    - foe: forest_lurker
      weight: 14
    - foe: ambush_vine
      weight: 12
    - foe: cave_bat
      weight: 8
  elite_pool:
    - ettercap
    - corrupt_treant
  boss: the_broodmother
  template: null
crypt:
  name: The Crypt
  difficulty: 3
  theme:
    axis: color
    value: blue
  # IDENTITY: true undead — lifedrain (greens heal them), dread-tick, paralysis-lock.
  drift: grave_chill
  boss_mirror: life_drain_lesser
  enemy_table:
    - foe: skeleton
      weight: 30
    - foe: skeletal_archer
      weight: 22
    - foe: rotting_zombie
      weight: 18
    - foe: ghoul
      weight: 16
    - foe: wight
      weight: 14
