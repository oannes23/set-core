# yaml-language-server: $schema=schemas/loot.schema.json
# Loot-roll tuning (CRAWL §3 / TUNING.md). FIRST-CUT, sim-gated — recalibrate the whole gold
# faucet/sink together once the shop sink + goldK settle. Shape is settled; numbers are balance.
goldK: 0.12
goldVar: 0.3
depthRate: 0.07
gearPityStep: 8
marketPerSlot: 10
rarePerTab: 10

# category-first per-tier tables: drops [min,max], a guaranteedGold wage (× one gold roll),
# qualityAdvantage (consumable tier rolled twice keep-better), and category weights.
tables:
  minion:
    drops: [1, 1]
    guaranteedGold: 0
    qualityAdvantage: false
    weights: { gold: 60, consumable: 30, gear: 10, spellbook: 0 }
  elite:
    drops: [2, 3]
    guaranteedGold: 2
    qualityAdvantage: true
    weights: { gold: 45, consumable: 35, gear: 20, spellbook: 0 }
  boss:
    drops: [5, 5]
    guaranteedGold: 4
    qualityAdvantage: true
    weights: { gold: 30, consumable: 40, gear: 20, spellbook: 10 }

# gear-rarity drop weights by CHARACTER/DUNGEON LEVEL band (BALANCE.md §5.4). Drops climb white→orange as
# you level. Elite/boss foes additionally roll twice keep-better (tables.*.qualityAdvantage skew), so a
# tougher foe at the same level skews up — the band is the floor, the foe tier is the bonus.
rarityBands:
  - { maxLevel: 5, weights: [[white, 65], [green, 28], [blue, 7]] }                       # ≤5: mostly white, some green, rarely blue
  - { maxLevel: 12, weights: [[white, 25], [green, 50], [blue, 20], [purple, 5]] }        # 6–12: mostly green, unusually blue, rarely purple
  - { maxLevel: 18, weights: [[white, 5], [green, 45], [blue, 35], [purple, 13], [orange, 2]] } # 13–18: green/blue, unusually purple, rarely orange
  - { maxLevel: 99, weights: [[green, 15], [blue, 50], [purple, 28], [orange, 7]] }       # 19+: mostly blue, some purple, rarely-but-more orange

# Merchant-House rare vendor (epic/legendary only) + the boss-clear marquee (guaranteed rare+).
rareWeights: [[purple, 60], [orange, 40]]
marqueeWeights: [[blue, 50], [purple, 35], [orange, 15]]

# slot groups the town Market vendor stocks (offhand = relic; trinkets cover both trinket slots).
marketGroups:
  - { label: Weapons, slot: weapon }
  - { label: Armor, slot: armor }
  - { label: Offhand, slot: relic }
  - { label: Trinkets, slot: trinket1 }
