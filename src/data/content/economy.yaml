# yaml-language-server: $schema=schemas/economy.schema.json
# The economy config (CRAWL §3 / §7). FIRST-CUT, sim-gated — recalibrate the faucet/sink together
# once the shop sink + goldK settle. Shape is settled; numbers are balance.
sellRate: 0.2 # sell-back = 20% of value (a town amenity raises it later)
buyMarkup: 1.5 # base shop buy = 150% of value (Merchant House pulls it → 100%)
rareMarkup: 2.0 # rare vendor premium

# item valuation
gear:
  base: { grey: 8, white: 20, green: 50, blue: 120, purple: 300, orange: 700 } # geometric rarity ladder
  tierK: 0.03 # +3% per loot-tier
  affixK: 0.15 # +15% per rolled affix
consumable:
  potionBase: 12
  scrollBase: 20

# the Merchant House upgrade tracks (pure-gold tiers)
merchant:
  markups: [1.5, 1.4, 1.3, 1.2, 1.1, 1.0] # buy markup by standing tier (150% → 100%)
  tierCost: [0, 1500, 3500, 6500, 11000, 18000] # gold to REACH each standing tier
quality:
  tierCost: [0, 2000, 5000, 10000, 18000] # gold to REACH each town-loot-quality tier
  lvlPerTier: 4 # each tier ≈ +4 levels of vendor rarity band

# the smith bench prices (flat first-cut; the curve shape lives in smithCost)
smith:
  upgradeBase: 80 # cost to reach rarity R = upgradeBase · 2^(idx−1) → 80/160/320/640/1280
  enchantBase: 100 # × current-rarity index → 100…500
  rerollBase: 45 # × current-rarity index → 90…225
  transferBase: 160 # × destination-rarity index → 480…800

# the account / vault
storage:
  defaultCap: 20
  slotStep: 10 # +10 slots per upgrade; cost = (cap + slotStep)²
  slotMax: 100
deathTithe: 0.12 # a run-ending death costs 12% of banked gold
starterStash: [hp_std, hp_std, speed_std, stoneskin_std, hp_minor, hp_minor]
