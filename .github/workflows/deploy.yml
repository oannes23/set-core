name: Deploy to GitHub Pages

# Builds the site and publishes it to GitHub Pages on every push to master.
# GitHub Pages just serves static files — pnpm/Vite/TypeScript are BUILD-time only and never
# run on the host. We compile the app with `pnpm build` (dist/index.html is the live client now),
# then fold in the archived prototype (the migration oracle, with its own launcher), and publish.

on:
  push:
    branches: [master]
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

# The bundled JS actions still ship on the deprecated Node 20 until their next majors. Opt them
# onto Node 24 now (GitHub's recommended path) to clear the deprecation warnings. GitHub forces
# Node 24 as the default on 2026-06-16, after which this is a no-op and can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads the pnpm version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # D1 (FABLE §9): GATE the deploy — Vite doesn't typecheck and YAML content enters as unknown+cast, so
      # without this a dangling ref white-screens prod at boot and a schema error ships silently. The suite is
      # ~4s; run it (and typecheck) BEFORE build so a red commit never reaches Pages.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build # -> dist/ (compiled index.html = the live app + assets, base-prefixed for /set-core/)
      # The built dist/index.html IS the live client now. Fold in the archived prototype (oracle)
      # alongside it at /prototype/ (it carries its own launcher index.html).
      - name: Fold in the archived prototype
        run: cp -r prototype dist/prototype
      - uses: actions/configure-pages@v5
        with:
          enablement: true # try to enable Pages automatically; if it errors, enable it once in Settings → Pages → Source: GitHub Actions
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
